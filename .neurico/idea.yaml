idea:
  title: Where is Washing Machine stored in LLMs?
  domain: nlp
  hypothesis: 'In large language models, there are too many referenceable concepts
    for each to have a unique or nearly orthogonal direction in the residual stream.
    This research investigates whether specific compound concepts like ''washing machine''
    are explicitly represented, or if only components such as ''washing'' are stored
    and the presence of ''machine'' increases the likelihood of the compound concept.

    '
  background:
    description: 'There are too many referenceable things for each to have a direction,
      or even a ''nearly orthogonal'' direction in the residual stream. Where is ''washing
      machine'' stored in LLMs? Or is just ''washing'' stored and then it''s assumed
      that machine becomes more likely?

      '
  metadata:
